<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Baccarat Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎰 BACCARAT TABLE 🎰</h1>

    <div class="scoreboard">
        내 자산: <span id="balance">10,000</span> 원 | 
        현재 베팅: [<span id="current-bet-type">없음</span>] <span id="bet-amount">1,000</span> 원
    </div>

    <div class="table">
        <div class="area player">
            <h2>PLAYER</h2>
            <div class="score-display" id="player-score">0</div>
            <div class="cards-container" id="player-cards"></div>
        </div>

        <div class="area banker">
            <h2>BANKER</h2>
            <div class="score-display" id="banker-score">0</div>
            <div class="cards-container" id="banker-cards"></div>
        </div>
    </div>

    <div class="result-message" id="result-text">베팅 영역을 선택하고 DEAL을 누르세요!</div>

    <!-- 베팅 영역 -->
    <div class="betting-zone">
        <h3>어디에 베팅하시겠습니까? (판당 1,000원 고정)</h3>
        <div class="bet-buttons">
            <button class="btn btn-player" onclick="selectBet('PLAYER')">PLAYER (1.95배)</button>
            <button class="btn btn-tie" onclick="selectBet('TIE')">TIE (9배)</button>
            <button class="btn btn-banker" onclick="selectBet('BANKER')">BANKER (1.95배)</button>
        </div>
        <button class="btn btn-deal" id="deal-btn" onclick="playGame()" disabled>DEAL 🃏</button>
    </div>

    <!-- 📊 여기에 출목표(경기 기록) 구역이 들어갔어! -->
    <div class="roadmap-zone">
        <h3>📊 경기 기록 (최근 20경기)</h3>
        <div class="roadmap-board" id="roadmap-board">
            <!-- 자바스크립트에서 결과 동적 생성 -->
        </div>
        <div class="roadmap-summary">
            플레이어: <span id="count-p" style="color: #3498db; font-weight: bold;">0</span>회 | 
            뱅커: <span id="count-b" style="color: #e74c3c; font-weight: bold;">0</span>회 | 
            타이: <span id="count-t" style="color: #2ecc71; font-weight: bold;">0</span>회
        </div>
    </div>

    <!-- 자바스크립트 연동 (맨 아래에 위치) -->
    <script src="script.js"></script>
</body>
</html>
